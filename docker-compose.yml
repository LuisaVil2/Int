services:
  backend:
    build: .
    ports: ["8000:8000"]
    env_file: [.env]
    volumes: ["./voices:/app/voices", "./learning:/app/learning"]
    depends_on: [postgres, redis, qdrant]
  qa_frontend:
    build: ./qa_frontend
    ports: ["5173:5173"]
    depends_on: [backend]
  postgres:
    image: postgres:16
    environment: {POSTGRES_PASSWORD: postgres, POSTGRES_USER: postgres, POSTGRES_DB: medical_interpreter}
    ports: ["5432:5432"]
  redis:
    image: redis:7
    ports: ["6379:6379"]
  qdrant:
    image: qdrant/qdrant:latest
    ports: ["6333:6333"]
